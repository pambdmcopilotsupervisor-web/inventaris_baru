version: "3.8"

services:
  inventaris_baru:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Makassar
      # Wajib diisi di Dokploy → Environment Variables:
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      # Volume persisten untuk foto selfie absensi mobile dan foto sakit
      - inventaris_uploads:/app/public/uploads
    networks:
      - dokploy-network

# Gunakan network dokploy-network yang sudah ada
# agar app bisa mengakses database di container lain
networks:
  dokploy-network:
    external: true

volumes:
  inventaris_uploads:
    # Gunakan named volume Docker untuk persistensi file upload antar redeploy
    driver: local
