version: "3.8"

services:
  inventaris_baru:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Makassar
      # Wajib diisi di Dokploy → Environment Variables:
      - DATABASE_URL=${DATABASE_URL} 
      - SESSION_SECRET=${SESSION_SECRET}
      # MinIO / S3-compatible storage untuk foto absensi mobile
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_REGION=${MINIO_REGION}
      # Status Modul (true = aktif, false = nonaktif)
      # Ubah nilai lalu restart container — tidak perlu rebuild image.
      - MODULE_ASET=${MODULE_ASET:-true}
      - MODULE_SDM=${MODULE_SDM:-true}
      - MODULE_KINERJA=${MODULE_KINERJA:-true}
      - MODULE_KEUANGAN=${MODULE_KEUANGAN:-true}
    volumes:
      # Volume persisten untuk foto selfie absensi mobile dan foto sakit
      - inventaris_uploads:/app/public/uploads
    networks:
      - dokploy-network

# Gunakan network dokploy-network yang sudah ada
# agar app bisa mengakses database di container lain
networks:
  dokploy-network:
    external: true

volumes:
  inventaris_uploads:
    # Gunakan named volume Docker untuk persistensi file upload antar redeploy
    driver: local
